<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex via PokeAPI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/min-web.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div class="container my-5 text-center">
        <h1 class="display-4 fw-bold text-danger">Pokédex</h1>
        <p class="lead text-muted">Exemplo de consumo de API assíncrona para aprendizado - PICTEC</p>
        <p class="lead text-muted">Este projeto foi desenvolvido com o apoio da Fundect / MS</p>
        <hr class="w-25 mx-auto">
    </div>

    <div class="container mb-5">
        <div id="pokedex-container" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
            <div class="col text-center w-100" id="loading">
                <div class="spinner-border text-danger" role="status">
                    <span class="visually-hidden">Carregando Pokémon...</span>
                </div>
                <p class="mt-2 text-muted">Buscando dados da PokeAPI...</p>
            </div>
        </div>
    </div>
    <script src="script.js" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
